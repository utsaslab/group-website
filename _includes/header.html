<nav class="navbar sticky-top navbar-expand-md navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="{{ site.url }}{{ site.baseurl }}/">
         <img src="{{ site.url }}{{ site.baseurl }}/favicon.ico" width="30" height="30" style="margin-right:5px" class="d-inline-block align-top" alt="">
          {{ site.title | escape }}
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarColor02" aria-controls="navbarColor02" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>

        <div class="collapse navbar-collapse" id="navbarColor02">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="{{ site.url }}{{ site.baseurl }}/">Home</a></li>
                {% for page in site.nav_pages %}
                    <li class="nav-item"><a class="nav-link" href="{{ site.url }}{{ site.baseurl }}/{{page.name}}">{{page.name | replace: '-', ' ' | capitalize }}</a></li>
                {% endfor %}
            </ul>
        </div>
    </div>
